{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>Курсы валют</h1>
  <button class="btn btn-sm" onclick="exportHistory()">↓ CSV</button>
</div>

<div class="card">
  <div class="card-header">
    <div class="flex-row gap">
      <select id="base-filter" onchange="loadHistory()"></select>
      <div class="period-btns">
        <button class="period-btn" onclick="setPeriod(7,this)">7д</button>
        <button class="period-btn active" onclick="setPeriod(30,this)">30д</button>
        <button class="period-btn" onclick="setPeriod(90,this)">90д</button>
        <button class="period-btn" onclick="setPeriod(180,this)">180д</button>
      </div>
    </div>
    <div id="rate-summary" class="flex-row gap" style="font-size:13px;color:var(--text2)"></div>
  </div>
  <canvas id="historyChart" height="110"></canvas>
</div>

<div class="card mt">
  <div class="card-header">
    <h2>История</h2>
    <input type="text" id="date-filter" placeholder="Фильтр по дате..." oninput="filterHistory()" class="input-sm"/>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="sortable" onclick="sortHistory('date')">Дата</th>
          <th class="sortable" onclick="sortHistory('rate')">Курс</th>
          <th>Изменение</th>
          <th>Изм. %</th>
        </tr>
      </thead>
      <tbody id="history-body"><tr><td colspan="4" class="loading"><span class="spinner"></span></td></tr></tbody>
    </table>
  </div>
  <div class="pagination" id="hist-pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let histChart = null, histData = [], filteredHist = [];
let histPage = 1; const HIST_PAGE = 30;
let histSortKey = 'date', histSortDir = -1;
let currentDays = 30;

async function populatePairs() {
  const data = await api('/api/rates/latest');
  if (!data) return;
  const pairs = [...new Set(data.map(r => r.base_currency + '-' + r.target_currency))].sort();
  const sel = document.getElementById('base-filter');
  sel.innerHTML = pairs.map(p => `<option value="${p}">${p.replace('-','/')}</option>`).join('');

  // Подхватить пару из URL ?pair=
  const urlPair = new URLSearchParams(window.location.search).get('pair');
  if (urlPair && pairs.includes(urlPair)) sel.value = urlPair;
  else sel.value = 'USD-RUB';

  loadHistory();
}

function setPeriod(d, btn) {
  currentDays = d;
  document.querySelectorAll('.period-btns .period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory();
}

async function loadHistory() {
  const pair = document.getElementById('base-filter').value;
  document.getElementById('history-body').innerHTML =
    `<tr><td colspan="4" class="loading"><span class="spinner"></span></td></tr>`;

  const data = await api(`/api/rates/${pair}?days=${currentDays}`);
  if (!data || !data.length) {
    document.getElementById('history-body').innerHTML =
      `<tr><td colspan="4" class="muted" style="text-align:center;padding:20px">Нет данных</td></tr>`;
    return;
  }

  // Сводка
  const first = data[0].rate, last = data[data.length-1].rate;
  const chg = last - first, chgPct = (chg / first * 100);
  const min = Math.min(...data.map(d=>d.rate)), max = Math.max(...data.map(d=>d.rate));
  document.getElementById('rate-summary').innerHTML = `
    <span>Текущий: <b>${last.toFixed(4)}</b></span>
    <span class="${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(4)} (${chgPct.toFixed(2)}%)</span>
    <span style="color:var(--text2)">Мин: ${min.toFixed(4)} / Макс: ${max.toFixed(4)}</span>`;

  // График
  if (histChart) histChart.destroy();
  const trend = last > first;
  histChart = new Chart(document.getElementById('historyChart'), {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: pair.replace('-','/'),
        data: data.map(d => d.rate),
        borderColor: trend ? '#22c55e' : '#ef4444',
        backgroundColor: trend ? 'rgba(34,197,94,0.07)' : 'rgba(239,68,68,0.07)',
        borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 10, color: '#8892a4' }, grid: { color: '#2e3250' } },
        y: { ticks: { color: '#8892a4' }, grid: { color: '#2e3250' } }
      }
    }
  });

  // Таблица — от новых к старым
  histData = [...data].reverse().map((r, i, arr) => {
    const prev = arr[i+1];
    const diff = prev ? r.rate - prev.rate : null;
    const pct  = prev ? (diff / prev.rate * 100) : null;
    return { date: r.date, rate: r.rate, diff, pct };
  });
  filteredHist = [...histData];
  renderHistory();
}

function renderHistory() {
  const start = (histPage - 1) * HIST_PAGE;
  const page = filteredHist.slice(start, start + HIST_PAGE);
  document.getElementById('history-body').innerHTML = page.map(r => {
    const cls = r.diff > 0 ? 'up' : r.diff < 0 ? 'down' : '';
    const sign = r.diff > 0 ? '+' : '';
    return `<tr>
      <td>${r.date}</td>
      <td><b>${r.rate.toFixed(4)}</b></td>
      <td class="${cls}">${r.diff != null ? sign + r.diff.toFixed(4) : '—'}</td>
      <td class="${cls}">${r.pct != null ? sign + r.pct.toFixed(2) + '%' : '—'}</td>
    </tr>`;
  }).join('');

  const pages = Math.ceil(filteredHist.length / HIST_PAGE);
  document.getElementById('hist-pagination').innerHTML = pages > 1
    ? `<span class="page-info">${filteredHist.length} записей</span>` +
      Array.from({length: pages}, (_,i) =>
        `<button class="page-btn ${i+1===histPage?'active':''}" onclick="histPage=${i+1};renderHistory()">${i+1}</button>`
      ).join('')
    : '';
}

function filterHistory() {
  const q = document.getElementById('date-filter').value;
  filteredHist = histData.filter(r => r.date.includes(q));
  histPage = 1;
  renderHistory();
}

function sortHistory(key) {
  histSortDir = key === histSortKey ? -histSortDir : -1;
  histSortKey = key;
  filteredHist.sort((a,b) => (a[key] > b[key] ? 1 : -1) * histSortDir);
  histPage = 1;
  renderHistory();
}

function exportHistory() {
  const pair = document.getElementById('base-filter').value;
  exportCSV(histData.map(r => ({
    date: r.date, rate: r.rate,
    change: r.diff?.toFixed(4) ?? '',
    change_pct: r.pct?.toFixed(4) ?? ''
  })), `${pair}_${currentDays}d.csv`);
}

populatePairs();
</script>
{% endblock %}
