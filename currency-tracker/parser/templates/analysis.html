{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>Анализ</h1></div>

<div class="card">
  <div class="card-header">
    <h2>Анализ валютной пары</h2>
    <div class="flex-row gap">
      <select id="an-pair" onchange="onPairChange()"></select>
      <div class="period-btns">
        <button class="period-btn" onclick="setAnDays(7,this)">7д</button>
        <button class="period-btn active" onclick="setAnDays(30,this)">30д</button>
        <button class="period-btn" onclick="setAnDays(90,this)">90д</button>
      </div>
      <button class="btn btn-primary" onclick="loadAll()">Анализ</button>
    </div>
  </div>
  <div id="analysis-result"></div>
</div>

<!-- Вкладки с графиками -->
<div class="card mt">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('bollinger',this)">Bollinger Bands</button>
    <button class="tab-btn" onclick="switchTab('macd',this)">MACD</button>
  </div>

  <div id="tab-bollinger" class="tab-panel active">
    <div class="card-header" style="padding:0 0 12px 0">
      <span class="muted" style="font-size:12px">Скользящая средняя ± 2σ. Выход за полосы = сигнал разворота.</span>
      <select id="bb-window" onchange="loadBollinger()">
        <option value="10">Окно 10</option>
        <option value="20" selected>Окно 20</option>
        <option value="30">Окно 30</option>
      </select>
    </div>
    <canvas id="bollingerChart" height="160"></canvas>
  </div>

  <div id="tab-macd" class="tab-panel">
    <div class="card-header" style="padding:0 0 12px 0">
      <span class="muted" style="font-size:12px">MACD (12,26,9). Пересечение сигнальной линии = сигнал входа/выхода.</span>
    </div>
    <canvas id="macdChart" height="100"></canvas>
    <canvas id="macdHistChart" height="80" style="margin-top:8px"></canvas>
  </div>
</div>

<div class="grid-2 mt">
  <div class="card">
    <h2>Корреляция пар</h2>
    <div class="flex-col gap mt-sm">
      <div class="flex-row gap">
        <label style="font-size:12px;color:var(--text2);width:30px">Пара 1</label>
        <select id="corr-pair1" class="input-lg"></select>
      </div>
      <div class="flex-row gap">
        <label style="font-size:12px;color:var(--text2);width:30px">Пара 2</label>
        <select id="corr-pair2" class="input-lg"></select>
      </div>
      <button class="btn btn-primary" onclick="loadCorrelation()">Рассчитать</button>
    </div>
    <div id="corr-result" class="mt"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Арбитражные возможности</h2>
      <button class="btn btn-sm" onclick="loadArbitrage()">↻</button>
    </div>
    <div id="arbitrage-result"><span class="spinner"></span></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let anDays = 30;
let bollingerChart = null, macdChart = null, macdHistChart = null;

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'bollinger') loadBollinger();
  if (name === 'macd') loadMACD();
}

async function populatePairs() {
  const data = await api('/api/rates/latest');
  if (!data) return;
  const pairs = [...new Set(data.map(r => r.base_currency + '-' + r.target_currency))].sort();
  const opts = pairs.map(p => `<option value="${p}">${p.replace('-','/')}</option>`).join('');
  ['an-pair','corr-pair1','corr-pair2'].forEach(id => {
    document.getElementById(id).innerHTML = opts;
  });
  document.getElementById('an-pair').value = 'USD-RUB';
  document.getElementById('corr-pair1').value = 'USD-RUB';
  document.getElementById('corr-pair2').value = 'EUR-RUB';
  loadAll();
  loadArbitrage();
}

function onPairChange() { /* пара изменена — не перезагружаем автоматически */ }

function setAnDays(d, btn) {
  anDays = d;
  document.querySelectorAll('.card:first-child .period-btns .period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function loadAll() {
  loadAnalysis();
  loadBollinger();
  loadMACD();
}

async function loadAnalysis() {
  const pair = document.getElementById('an-pair').value;
  const el = document.getElementById('analysis-result');
  el.innerHTML = '<span class="spinner"></span>';

  const d = await api(`/api/analysis/${pair}?days=${anDays}`);
  if (!d) { el.innerHTML = '<p class="error">Ошибка загрузки</p>'; return; }

  const s = d.statistics || {};
  const trendCls = d.trend === 'up' ? 'trend-up' : d.trend === 'down' ? 'trend-down' : 'trend-stable';
  const trendIcon = d.trend === 'up' ? '▲ Рост' : d.trend === 'down' ? '▼ Падение' : '→ Стабильно';

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-top:12px">
      <div class="analysis-block">
        <div class="metric-label">Тренд</div>
        <span class="badge ${trendCls}" style="font-size:14px;padding:4px 12px">${trendIcon}</span>
      </div>
      <div class="analysis-block">
        <div class="metric-label" style="margin-bottom:8px">RSI (14)</div>
        ${rsiBar(d.rsi)}
      </div>
      <div class="analysis-block">
        <div class="metric-label">Прогноз (SMA)</div>
        <div style="font-size:20px;font-weight:700;color:var(--accent)">${fmt(d.predicted_rate)}</div>
      </div>
      <div class="analysis-block">
        <div class="metric-label">Среднее за период</div>
        <div style="font-size:18px;font-weight:600">${fmt(s.avg_rate)}</div>
      </div>
      <div class="analysis-block">
        <div class="metric-label">Диапазон</div>
        <div><span class="down">${fmt(s.min_rate)}</span> — <span class="up">${fmt(s.max_rate)}</span></div>
      </div>
      <div class="analysis-block">
        <div class="metric-label">Волатильность (σ)</div>
        <div style="font-size:16px;font-weight:600">${fmt(s.volatility)}</div>
      </div>
      <div class="analysis-block">
        <div class="metric-label">Точек данных</div>
        <div style="font-size:16px">${s.data_points || '—'}</div>
      </div>
      <div class="analysis-block">
        <div class="metric-label">Период</div>
        <div style="font-size:12px;color:var(--text2)">${s.date_from || '—'} → ${s.date_to || '—'}</div>
      </div>
    </div>`;
}

async function loadBollinger() {
  const pair = document.getElementById('an-pair').value;
  const window = document.getElementById('bb-window').value;
  const days = Math.max(anDays, 60);
  const data = await api(`/api/analysis/${pair}/bollinger?days=${days}&window=${window}`);
  if (!data || !data.length) return;

  const labels = data.map(d => d.date);
  const price  = data.map(d => d.rate);
  const sma    = data.map(d => d.sma);
  const upper  = data.map(d => d.upper);
  const lower  = data.map(d => d.lower);

  if (bollingerChart) bollingerChart.destroy();
  bollingerChart = new Chart(document.getElementById('bollingerChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Верхняя полоса', data: upper, borderColor: 'rgba(239,68,68,0.6)', borderWidth: 1, borderDash: [4,3], pointRadius: 0, fill: false },
        { label: 'SMA', data: sma, borderColor: '#f59e0b', borderWidth: 1.5, pointRadius: 0, fill: false },
        { label: 'Нижняя полоса', data: lower, borderColor: 'rgba(34,197,94,0.6)', borderWidth: 1, borderDash: [4,3], pointRadius: 0,
          fill: { target: 0, above: 'rgba(79,142,247,0.04)' } },
        { label: pair.replace('-','/'), data: price, borderColor: '#4f8ef7', borderWidth: 2, pointRadius: 0, fill: false },
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { ticks: { maxTicksLimit: 10, color: '#8892a4' }, grid: { color: '#2e3250' } },
        y: { ticks: { color: '#8892a4' }, grid: { color: '#2e3250' } }
      }
    }
  });
}

async function loadMACD() {
  const pair = document.getElementById('an-pair').value;
  const days = Math.max(anDays, 60);
  const data = await api(`/api/analysis/${pair}/macd?days=${days}`);
  if (!data || !data.length) return;

  const labels    = data.map(d => d.date);
  const macdLine  = data.map(d => d.macd);
  const sigLine   = data.map(d => d.signal);
  const histogram = data.map(d => d.histogram);
  const histColors = histogram.map(v => v == null ? 'transparent' : v >= 0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)');

  if (macdChart) macdChart.destroy();
  macdChart = new Chart(document.getElementById('macdChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'MACD', data: macdLine, borderColor: '#4f8ef7', borderWidth: 1.5, pointRadius: 0, fill: false },
        { label: 'Signal', data: sigLine, borderColor: '#f59e0b', borderWidth: 1.5, pointRadius: 0, fill: false },
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#8892a4', boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { ticks: { maxTicksLimit: 10, color: '#8892a4' }, grid: { color: '#2e3250' } },
        y: { ticks: { color: '#8892a4' }, grid: { color: '#2e3250' } }
      }
    }
  });

  if (macdHistChart) macdHistChart.destroy();
  macdHistChart = new Chart(document.getElementById('macdHistChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Гистограмма',
        data: histogram,
        backgroundColor: histColors,
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 10, color: '#8892a4' }, grid: { color: '#2e3250' } },
        y: { ticks: { color: '#8892a4' }, grid: { color: '#2e3250' } }
      }
    }
  });
}

async function loadCorrelation() {
  const p1 = document.getElementById('corr-pair1').value;
  const p2 = document.getElementById('corr-pair2').value;
  const el = document.getElementById('corr-result');
  el.innerHTML = '<span class="spinner"></span>';

  const d = await api(`/api/correlation?pair1=${p1}&pair2=${p2}&days=30`);
  if (!d) { el.innerHTML = '<p class="error">Ошибка</p>'; return; }

  const corr = d.correlation;
  const pct = corr != null ? Math.abs(corr) * 100 : 0;
  const cls = corr > 0.7 ? 'rsi-high' : corr < -0.7 ? 'rsi-low' : 'rsi-mid';
  const clsBadge = corr > 0.7 ? 'badge-green' : corr < -0.7 ? 'badge-red' : 'badge-blue';

  el.innerHTML = `
    <div class="analysis-block mt-sm">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span>${p1.replace('-','/')} ↔ ${p2.replace('-','/')}</span>
        <span class="badge ${clsBadge}">${d.interpretation}</span>
      </div>
      <div class="rsi-track" style="height:8px;margin-bottom:6px">
        <div class="rsi-fill ${cls}" style="width:${pct}%"></div>
      </div>
      <div style="font-size:22px;font-weight:700;text-align:center">
        ${corr != null ? corr.toFixed(4) : 'N/A'}
      </div>
    </div>`;
}

async function loadArbitrage() {
  const el = document.getElementById('arbitrage-result');
  const data = await api('/api/arbitrage');
  if (!data) { el.innerHTML = '<p class="error">Ошибка</p>'; return; }

  if (!data.length) {
    el.innerHTML = '<p class="muted" style="padding:16px;text-align:center">Арбитражных возможностей не найдено</p>';
    return;
  }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>A</th><th>→ B</th><th>→ C</th><th>Прибыль</th></tr></thead>
    <tbody>${data.map(o => `<tr>
      <td><b>${o.currency_a}</b></td>
      <td>${o.currency_b}</td>
      <td>${o.currency_c}</td>
      <td class="up">+${o.profit_percent.toFixed(4)}%</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

populatePairs();
</script>
{% endblock %}
