{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>Дашборд</h1>
  <button class="btn btn-primary" onclick="refreshAll()">↻ Обновить</button>
</div>

<div class="stats-grid">
  <div class="stat-card"><div class="stat-label">Валют в БД</div><div class="stat-value" id="stat-currencies">—</div></div>
  <div class="stat-card"><div class="stat-label">Записей курсов</div><div class="stat-value" id="stat-rates">—</div></div>
  <div class="stat-card"><div class="stat-label">Источников</div><div class="stat-value" id="stat-sources">—</div></div>
  <div class="stat-card"><div class="stat-label">Последнее обновление</div><div class="stat-value" id="stat-update" style="font-size:16px">—</div></div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-header">
      <h2>Топ волатильных пар</h2>
      <div class="period-btns">
        <button class="period-btn active" onclick="setVolDays(7,this)">7д</button>
        <button class="period-btn" onclick="setVolDays(14,this)">14д</button>
        <button class="period-btn" onclick="setVolDays(30,this)">30д</button>
      </div>
    </div>
    <div id="volatility-list" class="pair-list"><span class="spinner"></span></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>График курса</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="chart-pair" onchange="loadChart()"></select>
        <div class="period-btns">
          <button class="period-btn active" onclick="setChartDays(7,this)">7д</button>
          <button class="period-btn" onclick="setChartDays(30,this)">30д</button>
          <button class="period-btn" onclick="setChartDays(90,this)">90д</button>
        </div>
      </div>
    </div>
    <canvas id="rateChart" height="190"></canvas>
  </div>
</div>

<div class="card mt">
  <div class="card-header">
    <h2>Актуальные курсы</h2>
    <div class="flex-row gap">
      <input type="text" id="rates-filter" placeholder="Поиск пары..." oninput="filterRates()" class="input-sm"/>
      <button class="btn btn-sm" onclick="exportRates()">↓ CSV</button>
    </div>
  </div>
  <div class="table-wrap">
    <table id="rates-table">
      <thead>
        <tr>
          <th class="sortable" onclick="sortRates('currency_pair')">Пара</th>
          <th class="sortable" onclick="sortRates('rate')">Курс</th>
          <th>Тренд</th>
          <th class="sortable" onclick="sortRates('rate_date')">Дата</th>
          <th>Источник</th>
        </tr>
      </thead>
      <tbody id="rates-body"><tr><td colspan="5" class="loading"><span class="spinner"></span> Загрузка...</td></tr></tbody>
    </table>
  </div>
  <div class="pagination" id="rates-pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allRates = [], filteredRates = [], rateChart = null;
let sortKey = 'currency_pair', sortDir = 1;
let currentPage = 1; const PAGE_SIZE = 20;
let chartDays = 7, volDays = 7;
let sparkData = {};

async function loadStatus() {
  const d = await api('/api/status');
  if (!d) return;
  document.getElementById('stat-currencies').textContent = d.currencies;
  document.getElementById('stat-rates').textContent = d.exchange_rates.toLocaleString('ru');
  document.getElementById('stat-sources').textContent = d.data_sources;
  document.getElementById('stat-update').textContent = d.last_update || '—';
  document.getElementById('db-status').className = 'status-dot online';
  document.getElementById('db-info').textContent = 'БД подключена';
}

async function loadVolatility() {
  const data = await api(`/api/volatility?days=${volDays}`);
  if (!data) return;
  document.getElementById('volatility-list').innerHTML = data.map((item, i) => `
    <div class="pair-row" onclick="selectPair('${item.currency_pair.replace('/','-')}')">
      <span class="pair-rank">${i+1}</span>
      <span class="pair-name">${item.currency_pair}</span>
      <span class="pair-vol">σ ${item.volatility.toFixed(4)}</span>
      <span class="pair-avg">${item.avg_rate.toFixed(4)}</span>
      <span class="pair-pts" style="font-size:11px;color:var(--text2)">${item.data_points}pt</span>
    </div>`).join('');
}

function setVolDays(d, btn) {
  volDays = d;
  document.querySelectorAll('.card .period-btns .period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadVolatility();
}

async function populatePairSelect() {
  const data = await api('/api/rates/latest');
  if (!data) return;
  const pairs = [...new Set(data.map(r => r.base_currency + '-' + r.target_currency))].sort();
  const sel = document.getElementById('chart-pair');
  sel.innerHTML = pairs.map(p => `<option value="${p}">${p.replace('-','/')}</option>`).join('');
  sel.value = 'USD-RUB';
}

async function loadChart() {
  const pair = document.getElementById('chart-pair').value;
  const data = await api(`/api/rates/${pair}?days=${chartDays}`);
  if (!data || !data.length) return;

  if (rateChart) rateChart.destroy();
  const labels = data.map(d => d.date);
  const values = data.map(d => d.rate);
  const trend = values[values.length-1] > values[0];

  rateChart = new Chart(document.getElementById('rateChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: pair.replace('-','/'),
        data: values,
        borderColor: trend ? '#22c55e' : '#ef4444',
        backgroundColor: trend ? 'rgba(34,197,94,0.07)' : 'rgba(239,68,68,0.07)',
        borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y.toFixed(4)}`
          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, color: '#8892a4' }, grid: { color: '#2e3250' } },
        y: { ticks: { color: '#8892a4' }, grid: { color: '#2e3250' } }
      }
    }
  });
}

function setChartDays(d, btn) {
  chartDays = d;
  document.querySelectorAll('.card:nth-child(2) .period-btns .period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadChart();
}

async function loadRates() {
  const data = await api('/api/rates/latest');
  if (!data) return;
  allRates = data;

  // Загружаем спарклайны для топ-10 пар
  const top = data.slice(0, 10);
  await Promise.all(top.map(async r => {
    const key = r.base_currency + '-' + r.target_currency;
    const hist = await api(`/api/rates/${key}?days=7`);
    if (hist) sparkData[key] = hist.map(h => h.rate);
  }));

  filteredRates = [...allRates];
  sortRates(sortKey, true);
}

function renderRates(data) {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = data.slice(start, start + PAGE_SIZE);

  document.getElementById('rates-body').innerHTML = page.map(r => {
    const key = r.base_currency + '-' + r.target_currency;
    const spark = sparkData[key] ? sparkline(sparkData[key]) : '';
    const trendCls = spark && sparkData[key] ?
      (sparkData[key][sparkData[key].length-1] > sparkData[key][0] ? 'up' : 'down') : '';
    const trendIcon = trendCls === 'up' ? '▲' : trendCls === 'down' ? '▼' : '—';
    return `<tr style="cursor:pointer" onclick="window.location='/rates?pair=${key}'">
      <td><b>${r.currency_pair}</b></td>
      <td>${parseFloat(r.rate).toFixed(4)}</td>
      <td class="spark">${spark} <span class="${trendCls}">${trendIcon}</span></td>
      <td>${r.rate_date}</td>
      <td><span class="badge">${r.source_name.replace('Central Bank of Russia','ЦБ РФ').replace('European Central Bank','ЕЦБ')}</span></td>
    </tr>`;
  }).join('');

  renderPagination(data.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { document.getElementById('rates-pagination').innerHTML = ''; return; }
  let html = `<span class="page-info">${total} записей</span>`;
  for (let i = 1; i <= pages; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('rates-pagination').innerHTML = html;
}

function goPage(p) { currentPage = p; renderRates(filteredRates); }

function filterRates() {
  const q = document.getElementById('rates-filter').value.toLowerCase();
  filteredRates = allRates.filter(r =>
    r.currency_pair.toLowerCase().includes(q) ||
    r.source_name.toLowerCase().includes(q)
  );
  currentPage = 1;
  renderRates(filteredRates);
}

function sortRates(key, silent = false) {
  if (!silent) {
    sortDir = key === sortKey ? -sortDir : 1;
    sortKey = key;
    document.querySelectorAll('th.sortable').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
    });
    const th = [...document.querySelectorAll('th.sortable')].find(t => t.getAttribute('onclick').includes(key));
    if (th) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
  filteredRates.sort((a, b) => {
    const av = a[key], bv = b[key];
    return typeof av === 'number' ? (av - bv) * sortDir : String(av).localeCompare(String(bv)) * sortDir;
  });
  currentPage = 1;
  renderRates(filteredRates);
}

function exportRates() {
  exportCSV(filteredRates, `rates_${new Date().toISOString().slice(0,10)}.csv`);
}

function selectPair(pair) {
  const sel = document.getElementById('chart-pair');
  if (sel) sel.value = pair;
  loadChart();
}

async function refreshAll() {
  await loadStatus();
  loadVolatility();
  loadChart();
  loadRates();
}

populatePairSelect().then(() => refreshAll());
setInterval(refreshAll, 60000);
</script>
{% endblock %}
