{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>Конвертер валют</h1></div>

<div class="card converter-card">
  <div class="converter-row">
    <div class="converter-field">
      <label>Сумма</label>
      <input type="number" id="amount" value="1000" min="0.01" step="any" class="input-lg" oninput="debounceConvert()"/>
    </div>
    <div class="converter-field">
      <label>Из</label>
      <select id="from-curr" class="input-lg" onchange="convert(); loadCrossRates()"></select>
    </div>
    <div class="converter-swap" onclick="swapCurrencies()" title="Поменять местами">⇄</div>
    <div class="converter-field">
      <label>В</label>
      <select id="to-curr" class="input-lg" onchange="convert()"></select>
    </div>
    <button class="btn btn-primary btn-lg" onclick="convert()">Конвертировать</button>
  </div>
  <div id="convert-result" class="convert-result"></div>
</div>

<div class="grid-2 mt">
  <div class="card">
    <h2>Кросс-курсы для <span id="cross-base">USD</span></h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Валюта</th><th>Курс</th><th>1 000 <span id="cross-base2">USD</span> =</th></tr></thead>
        <tbody id="cross-body"><tr><td colspan="3" class="loading"><span class="spinner"></span></td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>История конвертаций</h2>
      <button class="btn btn-sm" onclick="clearHistory()">Очистить</button>
    </div>
    <div id="conv-history" class="pair-list" style="max-height:280px;overflow-y:auto">
      <p class="muted" style="padding:12px;text-align:center">Конвертации появятся здесь</p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let convHistory = JSON.parse(localStorage.getItem('conv_history') || '[]');
let debTimer = null;

async function loadCurrencies() {
  const data = await api('/api/currencies');
  if (!data) return;
  const opts = data.map(c => `<option value="${c.code}">${c.code} — ${c.name}</option>`).join('');
  document.getElementById('from-curr').innerHTML = opts;
  document.getElementById('to-curr').innerHTML = opts;
  document.getElementById('from-curr').value = 'USD';
  document.getElementById('to-curr').value = 'RUB';
  convert();
  loadCrossRates();
  renderHistory();
}

function debounceConvert() {
  clearTimeout(debTimer);
  debTimer = setTimeout(convert, 500);
}

async function convert() {
  const amount = parseFloat(document.getElementById('amount').value);
  const from = document.getElementById('from-curr').value;
  const to = document.getElementById('to-curr').value;
  if (!amount || amount <= 0) return;

  const d = await api(`/api/convert?amount=${amount}&from_curr=${from}&to_curr=${to}`);
  const el = document.getElementById('convert-result');
  if (!d) return;

  if (d.result !== null) {
    const rate = d.result / amount;
    el.innerHTML = `
      <span class="result-amount">${amount.toLocaleString('ru')}</span>
      <span class="result-from">${from}</span> =
      <span class="result-value">${parseFloat(d.result).toLocaleString('ru', {maximumFractionDigits:4})}</span>
      <span class="result-to">${to}</span>
      <span style="font-size:12px;color:var(--text2);margin-left:12px">1 ${from} = ${rate.toFixed(6)} ${to}</span>`;

    // Сохраняем в историю
    convHistory.unshift({ from, to, amount, result: d.result, rate, time: new Date().toLocaleTimeString('ru') });
    if (convHistory.length > 20) convHistory.pop();
    localStorage.setItem('conv_history', JSON.stringify(convHistory));
    renderHistory();
  } else {
    el.innerHTML = `<span class="error">Курс не найден для ${from}/${to}</span>`;
  }
}

async function loadCrossRates() {
  const base = document.getElementById('from-curr').value;
  document.getElementById('cross-base').textContent = base;
  document.getElementById('cross-base2').textContent = base;
  document.getElementById('cross-body').innerHTML =
    `<tr><td colspan="3" class="loading"><span class="spinner"></span></td></tr>`;

  const latest = await api('/api/rates/latest');
  if (!latest) return;
  const rows = latest.filter(r => r.base_currency === base || r.target_currency === base);
  document.getElementById('cross-body').innerHTML = rows.map(r => {
    const isSrc = r.base_currency === base;
    const target = isSrc ? r.target_currency : r.base_currency;
    const rate = isSrc ? r.rate : 1 / r.rate;
    return `<tr style="cursor:pointer" onclick="setTo('${target}')">
      <td><b>${target}</b></td>
      <td>${parseFloat(rate).toFixed(6)}</td>
      <td>${(1000 * rate).toFixed(2)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="3" class="muted" style="text-align:center">Нет данных</td></tr>';
}

function setTo(code) {
  document.getElementById('to-curr').value = code;
  convert();
}

function swapCurrencies() {
  const f = document.getElementById('from-curr');
  const t = document.getElementById('to-curr');
  [f.value, t.value] = [t.value, f.value];
  convert();
  loadCrossRates();
}

function renderHistory() {
  const el = document.getElementById('conv-history');
  if (!convHistory.length) {
    el.innerHTML = '<p class="muted" style="padding:12px;text-align:center">Конвертации появятся здесь</p>';
    return;
  }
  el.innerHTML = convHistory.map(h => `
    <div class="pair-row" style="cursor:default">
      <span style="font-size:11px;color:var(--text2);width:50px">${h.time}</span>
      <span class="pair-name" style="font-size:13px">
        ${h.amount.toLocaleString('ru')} ${h.from} = <b>${parseFloat(h.result).toLocaleString('ru',{maximumFractionDigits:2})}</b> ${h.to}
      </span>
      <span style="font-size:11px;color:var(--text2)">${h.rate.toFixed(4)}</span>
    </div>`).join('');
}

function clearHistory() {
  convHistory = [];
  localStorage.removeItem('conv_history');
  renderHistory();
}

loadCurrencies();
</script>
{% endblock %}
